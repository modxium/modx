name: Docker Installer

on:
  push:
    branches:
      - main
    paths:
      - 'installer/**'
      - '.github/workflows/installer-docker.yml'

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_IMAGE: modxium/modx
  GHCR_IMAGE: ghcr.io/modxium/modx

jobs:
  installer-apache:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php:
          - "8.5"
          - "8.4"
          - "8.3"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP variant
        uses: docker/build-push-action@v6
        with:
          context: ./installer/docker/apache
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:installer-php${{ matrix.php }}-apache
            ${{ env.GHCR_IMAGE }}:installer-php${{ matrix.php }}-apache

      - name: Build and push default aliases
        if: matrix.php == '8.5'
        uses: docker/build-push-action@v6
        with:
          context: ./installer/docker/apache
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:installer
            ${{ env.DOCKERHUB_IMAGE }}:installer-apache
            ${{ env.GHCR_IMAGE }}:installer
            ${{ env.GHCR_IMAGE }}:installer-apache