services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}

    ports:
      - "${HTTP_PORT:-8080}:80"

    environment:
      MODX_VERSION: ${MODX_VERSION:-3.2.1-pl}
      HTTP_PORT: ${HTTP_PORT:-8080}

      # Optional Git sync for project files.
      # Use a private GitHub repo with APP_GIT_TOKEN, or a public HTTPS repo without it.
      APP_GIT_ENABLED: ${APP_GIT_ENABLED:-false}
      APP_GIT_REPO: ${APP_GIT_REPO:-}
      APP_GIT_BRANCH: ${APP_GIT_BRANCH:-main}
      APP_GIT_TOKEN: ${APP_GIT_TOKEN:-}
      APP_GIT_AUTO_SYNC: ${APP_GIT_AUTO_SYNC:-true}
      APP_GIT_CLEAR_CACHE: ${APP_GIT_CLEAR_CACHE:-true}
      APP_GIT_ALLOW_PROTECTED_PATHS: ${APP_GIT_ALLOW_PROTECTED_PATHS:-false}

      # Optional GitHub webhook endpoint.
      # GitHub Payload URL example: https://example.com/modxium-webhook.php
      APP_WEBHOOK_ENABLED: ${APP_WEBHOOK_ENABLED:-false}
      APP_WEBHOOK_SECRET: ${APP_WEBHOOK_SECRET:-}
      APP_WEBHOOK_PATH: ${APP_WEBHOOK_PATH:-git-webhook.php}

    volumes:
      - data:/var/www/html

    restart: unless-stopped

volumes:
  data:
