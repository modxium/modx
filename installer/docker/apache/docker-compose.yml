name: modxium-modx-installer-apache

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}

    ports:
      - "${HTTP_PORT:-8080}:80"

    environment:
      MODX_VERSION: ${MODX_VERSION:-3.2.1-pl}

    volumes:
      - data:/var/www/html

    restart: unless-stopped

volumes:
  data: